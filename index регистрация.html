<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registration</title>
<link rel="stylesheet" href=" style регистрация.css">
</head>
<body>

<div class="container">

  <div class="top">
    <img src="Group 1.png" alt="">
  </div>

  <div class="profile">
    <label for="photoInput">
      <div class="avatar" id="avatar"></div>
    </label>
    <input type="file" id="photoInput" accept="image/*">
    <p class="change">CHANGE PHOTO</p>
  </div>

  <form id="signupForm">
    <input type="text" id="name" placeholder="NAME" required>
    <input type="text" id="surname" placeholder="SURNAME" required>
    <input type="password" id="password" placeholder="PASSWORD" required>
    <select id="classCourse" required>
      <option disabled selected>Select class / course</option>
      <optgroup label="School">
        <option>1 grade</option><option>2 grade</option><option>3 grade</option>
        <option>4 grade</option><option>5 grade</option><option>6 grade</option>
        <option>7 grade</option><option>8 grade</option><option>9 grade</option>
        <option>10 grade</option><option>11 grade</option>
      </optgroup>
      <optgroup label="University">
        <option>1 course</option><option>2 course</option><option>3 course</option>
        <option>4 course</option><option>5 course</option>
      </optgroup>
    </select>
    <input type="number" id="age" placeholder="Age" min="6" max="100">
    <button type="button" class="signup" id="signupBtn">SIGN UP</button>
  </form>

</div>

<script>
const input = document.getElementById("photoInput");
const avatar = document.getElementById("avatar");
let savedImage = "";

// Загружаем фото в Base64
input.addEventListener("change", function() {
  const file = this.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    savedImage = e.target.result; // Base64
    avatar.style.backgroundImage = `url(${savedImage})`;
    avatar.style.backgroundSize = "cover";
    avatar.style.backgroundPosition = "center";
  }
  reader.readAsDataURL(file);
});

// Сохраняем данные и переходим
document.getElementById("signupBtn").addEventListener("click", function() {
  const name = document.getElementById("name").value;
  const surname = document.getElementById("surname").value;
  const age = document.getElementById("age").value;
  const classCourse = document.getElementById("classCourse").value;

  if (!name || !surname) {
    alert("Enter name and surname");
    return;
  }

  localStorage.setItem("studentName", name);
  localStorage.setItem("studentSurname", surname);
  localStorage.setItem("studentAge", age);
  localStorage.setItem("studentClass", classCourse);
  if (savedImage) localStorage.setItem("studentPhoto", savedImage);

  // Переход
  window.location.href = "planner.html";
});
</script>

</body>
</html>
