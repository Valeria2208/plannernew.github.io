<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Planner</title>
<link rel="stylesheet" href="style планер.css">
</head>
<body>

<header>
<div class="logo">Smart student planner</div>

<nav>
<a href="index.html">My tasks</a>
<a href="schedule.html">Lesson schedule</a>
<a href="#">Analytics</a>
</nav>

<div class="right">
<span>🔔</span>
<img src="profile.png" class="profile" id="headerProfileImg">
</div>
</header>


<div class="container">

<div class="main">

<h1>Hi, <span id="username">Student</span></h1>

<h2>Your deadlines:</h2>

<div class="deadline">
<label>
<input type="checkbox" class="task">
<span class="subject">Math</span>
</label>
<span class="date">until April 10</span>
</div>

<div class="deadline">
<label>
<input type="checkbox" class="task">
<span class="subject">English</span>
</label>
<span class="date">until April 12</span>
</div>

<div class="deadline">
<label>
<input type="checkbox" class="task">
<span class="subject">History</span>
</label>
<span class="date">until April 15</span>
</div>

<div class="deadline">
<label>
<input type="checkbox" class="task">
<span class="subject">Physics</span>
</label>
<span class="date">until April 18</span>
</div>


<div class="achievements">

<h3>My achievements</h3>

<p>Tasks completed <span id="doneTasks">0</span> / <span id="totalTasks">4</span></p>

<div class="bar">
<div class="fill" id="progressBar"></div>
</div>

</div>

</div>


<div class="side">

<div class="card">
<h2>Timer</h2>

<input type="number" id="timerInput" placeholder="Enter minutes" min="1">

<div id="timer">00:00</div>

<button id="startBtn">Start</button>
<button id="pauseBtn">Pause</button>
<button id="resetBtn">Reset</button>

</div>


<div class="card">
<h3>Next Exam</h3>
<p id="nextExam">English — 20 March</p>
</div>

</div>

</div>



<script>

window.addEventListener("DOMContentLoaded", () => {

const name = localStorage.getItem("studentName");
if(name) document.getElementById("username").textContent = name;

const photo = localStorage.getItem("studentPhoto");
if(photo) document.getElementById("headerProfileImg").src = photo;


let timeLeft = 0 * 60
let timerInterval = null

function updateTimer(){

const minutes = Math.floor(timeLeft / 60)
const seconds = timeLeft % 60

document.getElementById("timer").textContent =
`${String(minutes).padStart(2,'0')}:${String(seconds).padStart(2,'0')}`

}

function startTimer(){

if(timerInterval) return

const input = document.getElementById("timerInput").value

if(input){
timeLeft = input * 60
updateTimer()
}

timerInterval = setInterval(()=>{

if(timeLeft > 0){
timeLeft--
updateTimer()
}else{
clearInterval(timerInterval)
timerInterval = null
alert("Time is up!")
}

},1000)

}

function pauseTimer(){
clearInterval(timerInterval)
timerInterval = null
}

function resetTimer(){
clearInterval(timerInterval)
timerInterval = null
timeLeft = 0 * 60
updateTimer()
}

document.getElementById("startBtn").addEventListener("click", startTimer)
document.getElementById("pauseBtn").addEventListener("click", pauseTimer)
document.getElementById("resetBtn").addEventListener("click", resetTimer)

updateTimer()


const tasks = document.querySelectorAll(".task")
const doneText = document.getElementById("doneTasks")
const totalText = document.getElementById("totalTasks")
const progressBar = document.getElementById("progressBar")

totalText.textContent = tasks.length

tasks.forEach(task=>{
task.addEventListener("change", updateProgress)
})

function updateProgress(){

let done = document.querySelectorAll(".task:checked").length

doneText.textContent = done

let percent = (done / tasks.length) * 100

progressBar.style.width = percent + "%"

tasks.forEach(task=>{
if(task.checked){
task.parentElement.style.textDecoration = "line-through"
task.parentElement.style.opacity = "0.6"
}else{
task.parentElement.style.textDecoration = "none"
task.parentElement.style.opacity = "1"
}
})

}

});

</script>

</body>
</html>
