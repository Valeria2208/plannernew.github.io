<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Analytics</title>
<link rel="stylesheet" href="analytics.css">
</head>

<body>

<header>
<div class="logo">Smart Student Planner</div>

<nav>
<a href="planner.html">My Tasks</a>
<a href="schedule.html">Schedule</a>
<a href="#">Analytics</a>
</nav>
</header>

<div class="container">

<div class="left">

<h1>Analytics</h1>
<h2>Statistics</h2>

<div class="stats">

<canvas id="donutChart" width="220" height="220"></canvas>

<div class="legend">

<div class="legend-item">
<span class="color study"></span>
<span id="studyText">Study 0%</span>
</div>

<div class="legend-item">
<span class="color exam"></span>
<span id="examText">Exam 0%</span>
</div>

<div class="legend-item">
<span class="color project"></span>
<span id="projectText">Project 0%</span>
</div>

<div class="legend-item">
<span class="color personal"></span>
<span id="personalText">Personal 0%</span>
</div>

</div>

</div>

</div>


<div class="right">

<h2>Time tracker</h2>

<canvas id="barChart" width="500" height="220"></canvas>

<div class="week-days">
<span>Mon</span>
<span>Tue</span>
<span>Wed</span>
<span>Thu</span>
<span>Fri</span>
</div>

<h2>Progress</h2>

<label>
<input type="radio" name="progress" value="deadlines" checked>
Deadlines completed
</label>

<label>
<input type="radio" name="progress" value="focus">
Focus time
</label>

</div>

</div>

<script src="analytics.js"></script>

</body>
</html>
